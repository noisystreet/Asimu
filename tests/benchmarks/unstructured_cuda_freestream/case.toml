name = "unstructured_cuda_freestream"
benchmark_id = "unstructured_cuda_freestream"

# 非结构网格由集成测试 attach_single_tet_farfield 注入。
# CUDA G1：f32 + backend=cuda + 一阶 Roe + RK4/Euler。

[numerics]
compute_precision = "f32"
backend = "cuda"

[mesh]
kind = "structured_3d"
nx = 1
ny = 1
nz = 1

[physics]
gamma = 1.4
gas_constant = 287.0

[freestream]
mach = 0.3
pressure = 101325.0
temperature = 288.15

[euler]
flux = "roe"
reconstruction = "first_order"

[time]
scheme = "rk4"
local_time_step = true
max_steps = 3
tolerance = 1.0e-12
