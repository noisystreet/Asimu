name = "lid_driven_cavity_re100_refined"
benchmark_id = "lid_driven_cavity_re100_refined"

[mesh]
kind = "structured_3d"
nx = 12
ny = 12
nz = 1
lx = 1.0
ly = 1.0
lz = 0.1

[physics]

[incompressible]
pressure = 0.0
velocity = [0.0, 0.0, 0.0]
density = 1.0
kinematic_viscosity = 0.01
velocity_under_relaxation = 0.05
pressure_under_relaxation = 0.01
convection_scheme = "upwind"

[incompressible.linear.momentum]
solver = "gmres"
restart = 16
max_iters = 50
tolerance = 1.0e-9

[incompressible.linear.pressure]
solver = "gmres"
restart = 64
max_iters = 500
tolerance = 1.0e-10

[incompressible.reference]
length = 1.0
velocity = 1.0

[boundary.i_min]
kind = "wall"
no_slip = true

[boundary.i_max]
kind = "wall"
no_slip = true

[boundary.j_min]
kind = "wall"
no_slip = true

[boundary.j_max]
kind = "moving_wall"
velocity = [1.0, 0.0, 0.0]

[boundary.k_min]
kind = "symmetry"

[boundary.k_max]
kind = "symmetry"

[time]
mode = "transient"
scheme = "piso"
max_steps = 100
min_steps = 100
dt = 0.0005
tolerance = 3.0e-5
