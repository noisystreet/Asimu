name = "channel_poiseuille"
benchmark_id = "channel_poiseuille"

[mesh]
kind = "structured_3d"
nx = 8
ny = 8
nz = 1
lx = 2.0
ly = 1.0
lz = 0.1

[physics]

[incompressible]
pressure = 0.0
velocity = [0.0, 0.0, 0.0]
body_force = [0.08, 0.0, 0.0]
density = 1.0
kinematic_viscosity = 0.01
velocity_under_relaxation = 0.3
pressure_under_relaxation = 0.3

[incompressible.linear.momentum]
solver = "gmres"
restart = 16
max_iters = 50
tolerance = 1.0e-9

[incompressible.linear.pressure]
solver = "gmres"
restart = 64
max_iters = 500
tolerance = 1.0e-10

[incompressible.reference]
length = 1.0
velocity = 1.0

[boundary.i_min]
kind = "periodic"
partner = "i_max"

[boundary.i_max]
kind = "periodic"
partner = "i_min"

[boundary.j_min]
kind = "wall"
no_slip = true

[boundary.j_max]
kind = "wall"
no_slip = true

[boundary.k_min]
kind = "symmetry"

[boundary.k_max]
kind = "symmetry"

[time]
mode = "steady"
max_steps = 2000
dt = 0.1
tolerance = 3.0e-5
