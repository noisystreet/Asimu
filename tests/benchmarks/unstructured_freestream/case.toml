name = "unstructured_freestream"
benchmark_id = "unstructured_freestream"

# 非结构网格由集成测试 attach_two_tet_farfield 注入（TOML 暂不支持内联混合单元）。
# 本文件供 benchmark_id / 文档引用；运行见 README.md。

[mesh]
kind = "structured_3d"
nx = 1
ny = 1
nz = 1

[physics]
gamma = 1.4
gas_constant = 287.0

[freestream]
mach = 0.3
pressure = 101325.0
temperature = 288.15

[euler]
flux = "hllc"
reconstruction = "first_order"

[time]
scheme = "euler"
local_time_step = true
max_steps = 1
tolerance = 1.0e-12
